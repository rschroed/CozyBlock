name: Task / Chore
description: Track maintenance, tooling, docs, or cleanup work
title: "[Task]: "
labels:
  - chore
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the work to be done.
      placeholder: Add issue templates and a repo workflow guide.
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: What should exist or be true when this task is complete?
      placeholder: |
        - AGENTS.md exists
        - README explains issue and branch workflow
        - PR template is in place
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: Relevant links or references
      description: Add related issues, docs, screenshots, or GitHub settings links.
      placeholder: Related issue or docs link
  - type: textarea
    id: testing
    attributes:
      label: Validation notes
      description: Explain how to verify the task outcome.
      placeholder: Confirm templates appear in GitHub and docs match the repo workflow.
